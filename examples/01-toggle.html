<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>novajs · 01 单设备开关（nova-ui 版）</title>
  <link rel="stylesheet" href="../../src/nova-style.css">
  <link rel="stylesheet" href="../../src/nova-ui.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="card w-80">
    <div class="card-body text-center">
      <div class="text-xs text-gray-500 mb-1">设备 ID: {{ device.id }}</div>
      <div class="card-title">{{ device.name }}</div>

      <!-- 用 device-card 包裹电源区 -->
      <div class="device-card mt-4">
        <div class="device-card-header">
          <div class="device-card-title">⚡ 电源</div>
          <span class="device-card-status"
                :class="power ? 'device-card-status-on' : 'device-card-status-off'"></span>
        </div>

        <!-- 用 switch 组件代替手写圆形按钮 -->
        <div class="device-card-actions justify-center">
          <label class="switch switch-lg" style="width: 5rem; height: 2.5rem;">
            <input type="checkbox" name="power" :disabled="busy">
            <span class="switch-slider"></span>
          </label>
        </div>
      </div>

      <!-- 状态文字：用 badge 替代手写颜色 span -->
      <div class="mt-4 text-sm">
        <span class="badge" :class="power ? 'badge-success' : 'badge-neutral'">
          {{ power ? '已开启' : '已关闭' }}
        </span>
        <span if="busy" class="badge badge-warning ml-2">
          <span class="loading loading-sm"></span> 通讯中
        </span>
      </div>

      <div if="msg" class="mt-3 text-xs text-gray-500">{{ msg }}</div>
    </div>

    <!-- 操作按钮组 -->
    <div class="card-footer flex gap-2">
      <button class="btn btn-ghost btn-sm btn-block" @click="reset()">重置</button>
      <button class="btn btn-primary btn-sm btn-block" @click="toggle()">
        {{ power ? '关闭设备' : '开启设备' }}
      </button>
    </div>
  </div>

  <script src="../../src/novajs.js"></script>
  <script>
    // ============ Mock 后端（生产环境删掉这段） ============
    ;(function () {
      var mockDB = { 'light-001': { on: false } }
      nova.http.get = async function (url) {
        await new Promise(function (r) { setTimeout(r, 200) })
        for (var k in mockDB) if (url.indexOf(k) >= 0) return Object.assign({}, mockDB[k])
        return {}
      }
      nova.http.post = async function (url, body) {
        await new Promise(function (r) { setTimeout(r, 400) })
        for (var k in mockDB) if (url.indexOf(k) >= 0) {
          if (body && body.on !== undefined) mockDB[k].on = body.on
        }
        return { ok: true }
      }
    })()

    // ============ 应用 ============
    const data = nova({
      data: {
        device: { id: 'light-001', name: '客厅吸顶灯' },
        power: false,
        busy: false,
        msg: ''
      },
      funcs: {
        async toggle () {
          this.busy = true
          this.msg = ''
          try {
            await nova.http.post('/api/device/' + this.device.id + '/toggle', { on: !this.power })
            this.power = !this.power
            this.msg = '✅ 已 ' + (this.power ? '开启' : '关闭')
            setTimeout(() => { if (this.msg.startsWith('✅')) this.msg = '' }, 2000)
          } catch (e) {
            this.msg = '❌ ' + e.message
          } finally {
            this.busy = false
          }
        },
        reset () {
          this.power = false
          this.msg = '已重置为关闭状态'
          setTimeout(() => { if (this.msg === '已重置为关闭状态') this.msg = '' }, 2000)
        }
      }
    })

    // 启动时拉真实状态
    nova.http.get('/api/device/' + data.device.id).then(function (d) {
      data.power = !!d.on
    })
  </script>
</body>
</html>
