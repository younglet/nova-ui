<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Nova UI · ‹nova-color-picker› demo</title>
  <link rel="stylesheet" href="../src/nova-style.min.css">
  <link rel="stylesheet" href="../src/nova-ui.min.css">
  <script src="../src/novajs.min.js"></script>
  <script src="../src/nova-ui-elements.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-1">‹nova-color-picker›</h1>
    <p class="text-sm text-gray-500 mb-6">HSV 三轴滑块 + HEX 输入 · 双向绑定</p>

    <div class="card mb-4">
      <div class="card-body">
        <label class="block text-sm font-medium mb-2">主题色</label>
        <nova-color-picker model="themeColor"></nova-color-picker>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-body">
        <h2 class="card-title">绑定到 UI</h2>
        <p class="text-sm text-gray-500 mb-3">修改 data.themeColor，下面的按钮颜色实时跟随</p>
        <div class="flex gap-3 items-center">
          <button class="btn btn-primary"
                  :style="{ background: themeColor, borderColor: themeColor }">
            主题按钮
          </button>
          <span class="badge" :style="{ background: themeColor, color: '#fff' }">
            {{ themeColor }}
          </span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h2 class="card-title">编程设置</h2>
        <p class="text-sm text-gray-500 mb-3">修改 themeColor 数据，UI 跟随</p>
        <div class="flex gap-2 flex-wrap">
          <button class="btn btn-sm" style="background:#ef4444;color:#fff" @click="themeColor = '#ef4444'">红</button>
          <button class="btn btn-sm" style="background:#10b981;color:#fff" @click="themeColor = '#10b981'">绿</button>
          <button class="btn btn-sm" style="background:#3b82f6;color:#fff" @click="themeColor = '#3b82f6'">蓝</button>
          <button class="btn btn-sm" style="background:#f59e0b;color:#fff" @click="themeColor = '#f59e0b'">橙</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    nova({ data: { themeColor: '#3b82f6' } })
  </script>
</body>
</html>
