<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>下载到 ESP32 · nova-ui</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f0f2f5; --card-bg: #ffffff; --text: #111827; --text-muted: #6b7280;
      --border: #e5e7eb; --code-bg: #f9fafb; --primary: #10b981; --primary-hover: #059669;
      --primary-disabled: #d1d5db; --error-bg: #fef2f2; --error-text: #b91c1c;
      --ok-bg: #f0fdf4; --ok-text: #15803d;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; --text-muted: #94a3b8;
        --border: #334155; --code-bg: #0f172a; --primary: #10b981; --primary-hover: #34d399;
        --primary-disabled: #334155; --error-bg: #450a0a; --error-text: #fca5a5;
        --ok-bg: #052e16; --ok-text: #86efac;
      }
    }
    :root.dark, .dark {
      --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; --text-muted: #94a3b8;
      --border: #334155; --code-bg: #0f172a; --primary: #10b981; --primary-hover: #34d399;
      --primary-disabled: #334155; --error-bg: #450a0a; --error-text: #fca5a5;
      --ok-bg: #052e16; --ok-text: #86efac;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg); color: var(--text);
      padding: 12px; font-size: 13px; line-height: 1.45;
      transition: background-color 0.2s, color 0.2s;
    }
    .flasher { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    h1 { margin: 0 0 4px; font-size: 14px; font-weight: 600; }
    p  { margin: 0 0 8px; color: var(--text-muted); font-size: 12px; }
    .file-list { margin: 0 0 8px; padding: 6px 8px; background: var(--code-bg); border-radius: 4px; font-size: 11px; color: var(--text-muted); max-height: 110px; overflow-y: auto; }
    .file-list code { display: block; color: var(--text); word-break: break-all; padding: 1px 0; font-family: ui-monospace, "SF Mono", Consolas, monospace; }
    button { display: block; width: 100%; padding: 8px 12px; background: var(--primary); color: #fff; border: 0; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background-color 0.15s; }
    button:disabled { background: var(--primary-disabled); cursor: not-allowed; }
    button:hover:not(:disabled) { background: var(--primary-hover); }
    .progress { margin-top: 8px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--primary); width: 0; transition: width 0.2s; }
    .status { margin-top: 8px; padding: 6px 8px; background: var(--code-bg); border-radius: 4px; font-size: 11px; min-height: 20px; word-break: break-all; }
    .status.error { background: var(--error-bg); color: var(--error-text); }
    .status.ok    { background: var(--ok-bg);    color: var(--ok-text); }
  </style>
</head>
<body>
  <div class="flasher">
    <h1>📥 下载到 ESP32 · nova-ui</h1>
    <p>把 novajs + nova-ui 三件套写到 /static/（5 个文件）</p>
    <div class="file-list">
      <code>/static/novajs.min.js</code>
      <code>/static/nova-ui-elements.min.js</code>
      <code>/static/nova-style.min.css</code>
      <code>/static/nova-ui.min.css</code>
      <code>/static/index.novaui.html</code>
    </div>
    <button id="flash-btn">📥 下载到 ESP32</button>
    <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="status" id="status">准备就绪</div>
  </div>

  <script src="../scripts/esp32-serial.js"></script>
  <script>
    const btn = document.getElementById('flash-btn')
    const status = document.getElementById('status')
    const bar = document.getElementById('progress-bar')
    const setStatus = (m, c) => { status.textContent = m; status.className = 'status' + (c ? ' ' + c : '') }
    const setProgress = p => { bar.style.width = Math.max(0, Math.min(100, p)) + '%' }

    const FILES = [
      { path: '/static/novajs.min.js',           url: '/novajs.min.js' },
      { path: '/static/nova-ui-elements.min.js', url: '/nova-ui-elements.min.js' },
      { path: '/static/nova-style.min.css',      url: '/nova-style.min.css' },
      { path: '/static/nova-ui.min.css',         url: '/nova-ui.min.css' },
      { path: '/static/index.novaui.html',       url: '/index.novaui.html' }
    ]
    const fileToBytes = async e => {
      const r = await fetch(e.url)
      if (!r.ok) throw new Error('下载 ' + e.url + ' 失败：' + r.status)
      return new Uint8Array(await r.arrayBuffer())
    }

    btn.addEventListener('click', async () => {
      if (!navigator.serial) { setStatus('浏览器不支持 Web Serial API，请用 Chrome / Edge / Opera。', 'error'); return }
      btn.disabled = true
      setStatus('正在准备文件…')
      setProgress(0)
      let esp
      try {
        const items = []
        for (const entry of FILES) {
          setStatus('准备 ' + entry.path + ' …')
          items.push({ path: entry.path, bytes: await fileToBytes(entry) })
        }
        setStatus('点击弹窗选择 ESP32 串口…')
        esp = new ESP32Serial()
        await esp.connect()
        for (let i = 0; i < items.length; i++) {
          const it = items[i]
          setStatus('写入 ' + it.path + ' (' + (i+1) + '/' + items.length + ')')
          const base = (i / items.length) * 100
          await esp.writeFile(it.path, it.bytes, pct => setProgress(base + (pct / items.length)))
        }
        setProgress(100)
        setStatus('✅ 完成！访问 http://<esp32-ip>/static/index.novaui.html', 'ok')
      } catch (e) {
        setStatus('❌ ' + (e.message || e), 'error')
        console.error(e)
      } finally {
        if (esp) try { await esp.disconnect() } catch (_) {}
        btn.disabled = false
      }
    })
  </script>
</body>
</html>
