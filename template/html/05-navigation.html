<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Nova UI - 导航栏、侧边栏、标签页</title>
  <link rel="stylesheet" href="../../src/nova-style.min.css">
  <link rel="stylesheet" href="../../src/nova-ui.min.css">
</head>
<body class="bg-gray-50">

  <!-- Navbar 浅色 -->
  <div class="navbar">
    <div class="navbar-brand">🏠 智能家居</div>
    <div class="navbar-actions">
      <input type="text" placeholder="搜索..." style="padding: 0.375rem 0.75rem; border: 1px solid var(--nova-border); border-radius: 0.5rem; background: var(--nova-bg);">
      <button class="btn btn-primary btn-sm">登录</button>
    </div>
  </div>

  <!-- Navbar 深色 -->
  <div class="navbar navbar-dark mt-4">
    <div class="navbar-brand">🌡️ 实验室环境监控</div>
    <div class="navbar-actions">
      <span class="status-dot status-online status-pulse"></span>
      <span class="text-sm">5 台设备在线</span>
      <button class="btn btn-sm" style="background-color: var(--gray-700); color: white;">设置</button>
    </div>
  </div>

  <!-- Drawer 侧边栏布局 -->
  <div class="mt-6">
    <h2 class="text-lg font-bold mb-3 px-4">Drawer 侧边栏布局</h2>
    <div class="drawer" style="height: 400px; border: 1px solid var(--nova-border); border-radius: 0.5rem; overflow: hidden;">
      <aside class="drawer-side">
        <div class="menu-title">主导航</div>
        <div class="menu-item active">
          <span>🏠</span>
          <span>首页</span>
        </div>
        <div class="menu-item">
          <span>📊</span>
          <span>仪表盘</span>
        </div>
        <div class="menu-item">
          <span>⚙️</span>
          <span>设备管理</span>
        </div>
        <div class="menu-item">
          <span>📈</span>
          <span>历史数据</span>
        </div>
        <div class="menu-title">系统</div>
        <div class="menu-item">
          <span>👤</span>
          <span>用户中心</span>
        </div>
        <div class="menu-item">
          <span>⚙️</span>
          <span>系统设置</span>
        </div>
      </aside>
      <main class="drawer-content">
        <h3 class="text-lg font-bold mb-2">主内容区</h3>
        <p class="text-sm text-gray-500">
          左侧菜单点击会高亮（需要在 .menu-item 上加 .active），
          这里是仪表盘内容。
        </p>
      </main>
    </div>
  </div>

  <!-- Tabs 标签页 -->
  <div class="mt-6 px-4">
    <h2 class="text-lg font-bold mb-3">Tabs 标签页</h2>

    <h3 class="text-sm font-bold text-gray-500 mb-2 mt-4">普通 Tabs</h3>
    <div class="tabs mb-4">
      <div class="tab active" onclick="activate(this)">实时数据</div>
      <div class="tab" onclick="activate(this)">历史趋势</div>
      <div class="tab" onclick="activate(this)">设备列表</div>
      <div class="tab" onclick="activate(this)">告警日志</div>
    </div>
    <div class="bg-white p-4 rounded-lg shadow">
      当前选中："实时数据"
    </div>

    <h3 class="text-sm font-bold text-gray-500 mb-2 mt-4">Boxed Tabs（带背景容器）</h3>
    <div class="tabs tabs-boxed mb-4">
      <div class="tab active" onclick="activate(this)">日</div>
      <div class="tab" onclick="activate(this)">周</div>
      <div class="tab" onclick="activate(this)">月</div>
      <div class="tab" onclick="activate(this)">年</div>
    </div>
  </div>

  <script>
    function activate(el) {
      el.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      el.classList.add('active')
    }
    // drawer menu 也用类似逻辑
    document.querySelectorAll('.menu-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'))
        item.classList.add('active')
      })
    })
  </script>

</body>
</html>
