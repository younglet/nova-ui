<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Nova UI · ‹nova-tabs› demo</title>
  <link rel="stylesheet" href="../../src/nova-style.min.css">
  <link rel="stylesheet" href="../../src/nova-ui.min.css">
  <script src="../../src/novajs.min.js"></script>
  <script src="../../src/nova-ui-elements.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">
  <div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold mb-1">‹nova-tabs›</h1>
    <p class="text-sm text-gray-500 mb-6">动态切换面板 · 键盘左右键 · 数据双向绑定</p>

    <div class="card mb-4">
      <div class="card-body">
        <nova-tabs model="active">
          <button slot="tab" data-tab="overview">概览</button>
          <button slot="tab" data-tab="sensors">传感器</button>
          <button slot="tab" data-tab="settings">设置</button>

          <div slot="panel" data-tab="overview">
            <p>当前面板：<code>{{ active }}</code></p>
            <p class="text-sm text-gray-500 mt-2">用 ← → 方向键切换 tab</p>
          </div>
          <div slot="panel" data-tab="sensors">
            <ul>
              <li>温度：24.5 °C</li>
              <li>湿度：62 %</li>
              <li>PM2.5：35</li>
            </ul>
          </div>
          <div slot="panel" data-tab="settings">
            <label class="flex items-center gap-2 mb-2">
              <nova-switch model="darkMode"></nova-switch>
              <span>暗色模式</span>
            </label>
            <label class="flex items-center gap-2">
              <nova-switch model="notify"></nova-switch>
              <span>推送通知</span>
            </label>
          </div>
        </nova-tabs>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h2 class="card-title">编程切换</h2>
        <p class="text-sm text-gray-500 mb-3">修改 data.active 即可切换面板</p>
        <div class="flex gap-2">
          <button class="btn btn-primary btn-sm" @click="active = 'overview'">概览</button>
          <button class="btn btn-primary btn-sm" @click="active = 'sensors'">传感器</button>
          <button class="btn btn-primary btn-sm" @click="active = 'settings'">设置</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    nova({ data: { active: 'overview', darkMode: false, notify: true } })
  </script>
</body>
</html>
